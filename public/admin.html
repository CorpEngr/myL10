<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyL10 — Admin</title>
<style>
:root {
  --accent: #c0392b; --accent-hover: #962d22; --accent-light: #fde8e7;
  --bg: #f4f4f4; --white: #ffffff; --border: #ebebeb; --border-dark: #d4d4d4;
  --text: #2c2c2c; --text-sec: #717171; --text-off: #b2b2b2;
  --green: #1e7e34; --blue: #0078d4;
  --shadow: 0 2px 10px rgba(0,0,0,.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; color: var(--text); background: var(--bg); min-height: 100vh; }

.hdr { background: var(--white); height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 12px; box-shadow: var(--shadow); border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 10; }
.hdr-logo { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
.hdr-pipe { width: 1px; height: 22px; background: var(--border-dark); }
.hdr-sub { font-size: 13px; color: var(--text-sec); font-weight: 600; }
.hdr-space { flex: 1; }
.hdr-user { font-size: 13px; color: var(--text-sec); }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 600; transition: background .12s, color .12s; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border-dark); }
.btn-outline:hover { background: var(--bg); }
.btn-view { background: #dbeeff; color: var(--blue); padding: 4px 11px; font-size: 12px; }
.btn-view:hover { background: var(--blue); color: #fff; }
.btn-danger { background: var(--accent-light); color: var(--accent); padding: 4px 11px; font-size: 12px; }
.btn-danger:hover { background: var(--accent); color: #fff; }
.btn-sm { padding: 4px 11px; font-size: 12px; }

.page { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.stat { background: var(--white); border-radius: 8px; padding: 18px 20px; box-shadow: var(--shadow); border-top: 3px solid var(--accent); }
.stat-val { font-size: 30px; font-weight: 800; color: var(--accent); }
.stat-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-sec); margin-top: 5px; }

.card { background: var(--white); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px; }
.card-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 15px; font-weight: 700; }

table { width: 100%; border-collapse: collapse; }
thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-sec); padding: 9px 16px; background: #f8f8f8; border-bottom: 2px solid var(--border-dark); text-align: left; }
tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafafa; }
.mono { font-family: 'Courier New', monospace; font-size: 12px; }
.role-badge { font-size: 10px; padding: 2px 8px; border-radius: 9px; font-weight: 700; }
.role-admin { background: var(--accent-light); color: var(--accent); }
.role-user { background: #dbeeff; color: var(--blue); }

.add-form { padding: 16px 20px; background: #fafafa; border-top: 1px solid var(--border); display: none; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.add-form.open { display: flex; }
.add-form .fld { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.add-form label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-sec); letter-spacing: .3px; }
.add-form input { border: 1.5px solid var(--border-dark); border-radius: 5px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; color: var(--text); }
.add-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.add-form .actions { display: flex; gap: 8px; align-items: flex-end; }

.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 9px 20px; border-radius: 5px; font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .2s; white-space: nowrap; }
.toast.show { opacity: 1; }

.empty-row td { text-align: center; color: var(--text-off); padding: 28px; font-size: 13px; }
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-logo">MyL10</span>
  <div class="hdr-pipe"></div>
  <span class="hdr-sub">Admin Panel</span>
  <div class="hdr-space"></div>
  <span class="hdr-user" id="hdrUser"></span>
  <button class="btn btn-outline" style="margin-left:12px;padding:4px 12px;font-size:12px" onclick="logout()">Sign Out</button>
</header>

<div class="page">

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-lbl">Total Employees</div>
    </div>
    <div class="stat" style="border-top-color:var(--blue)">
      <div class="stat-val" style="color:var(--blue)" id="statUsers">0</div>
      <div class="stat-lbl">Active Accounts</div>
    </div>
    <div class="stat" style="border-top-color:var(--green)">
      <div class="stat-val" style="color:var(--green)">✓ Online</div>
      <div class="stat-lbl">System Status</div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">
      <span class="card-title">Employee Accounts</span>
      <button class="btn btn-accent btn-sm" onclick="toggleAddForm()">+ Add Employee</button>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:32px">#</th>
          <th>Full Name</th>
          <th>Username</th>
          <th>Password</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="userTbody">
        <tr class="empty-row"><td colspan="6">Loading…</td></tr>
      </tbody>
    </table>
    <div class="add-form" id="addForm">
      <div class="fld"><label>Full Name</label><input id="nName" placeholder="e.g. Juan Cruz"></div>
      <div class="fld"><label>Username</label><input id="nUser" placeholder="e.g. jcruz"></div>
      <div class="fld"><label>Password</label><input id="nPass" placeholder="e.g. pass123" type="text"></div>
      <div class="actions">
        <button class="btn btn-accent btn-sm" onclick="addUser()">Create</button>
        <button class="btn btn-outline btn-sm" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let adminToken = null;

function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + localStorage.getItem('myl10_token'),
      ...(opts.headers || {})
    }
  }).then(r => r.json());
}

async function init() {
  const token = localStorage.getItem('myl10_token');
  const user = JSON.parse(localStorage.getItem('myl10_user') || 'null');
  if (!token || !user || user.role !== 'admin') { window.location.replace('/'); return; }
  adminToken = token;
  document.getElementById('hdrUser').textContent = 'Hi, ' + (user.name || user.username);
  await loadUsers();
}

async function loadUsers() {
  const users = await api('/api/admin/users');
  if (!Array.isArray(users)) { showToast('Failed to load users.'); return; }
  const nonAdmin = users.filter(u => u.role !== 'admin');
  document.getElementById('statTotal').textContent = nonAdmin.length;
  document.getElementById('statUsers').textContent = nonAdmin.length;
  const tbody = document.getElementById('userTbody');
  if (!users.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No accounts yet.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map((u, i) => `
    <tr>
      <td style="color:var(--text-off);font-size:12px">${i + 1}</td>
      <td><strong>${esc(u.name || u.username)}</strong></td>
      <td class="mono">${esc(u.username)}</td>
      <td class="mono" style="color:var(--text-sec)">${esc(u.password)}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td style="display:flex;gap:6px;align-items:center">
        ${u.role !== 'admin' ? `
          <button class="btn btn-view" onclick="viewL10(${u.id},'${esc(u.name || u.username)}')">👁 View L10</button>
          <button class="btn btn-danger" onclick="removeUser(${u.id},'${esc(u.username)}')">✕ Remove</button>
        ` : '<span style="color:var(--text-off);font-size:12px">— You —</span>'}
      </td>
    </tr>
  `).join('');
}

async function viewL10(userId, displayName) {
  const data = await api(`/api/admin/impersonate/${userId}`, { method: 'POST' });
  if (data.error) { showToast(data.error); return; }
  localStorage.setItem('myl10_admin_token', localStorage.getItem('myl10_token'));
  localStorage.setItem('myl10_admin_user', localStorage.getItem('myl10_user'));
  localStorage.setItem('myl10_token', data.token);
  localStorage.setItem('myl10_user', JSON.stringify(data.user));
  localStorage.setItem('myl10_impersonating', displayName);
  window.location.href = '/app';
}

async function addUser() {
  const name = document.getElementById('nName').value.trim();
  const username = document.getElementById('nUser').value.trim();
  const password = document.getElementById('nPass').value.trim();
  if (!username || !password) { showToast('Username and password are required.'); return; }
  const data = await api('/api/admin/users', {
    method: 'POST',
    body: JSON.stringify({ name, username, password })
  });
  if (data.error) { showToast(data.error); return; }
  showToast('Employee account created!');
  document.getElementById('addForm').classList.remove('open');
  ['nName','nUser','nPass'].forEach(id => document.getElementById(id).value = '');
  loadUsers();
}

async function removeUser(id, username) {
  if (!confirm(`Remove "${username}"? This will permanently delete their account and all their tasks.`)) return;
  await api(`/api/admin/users/${id}`, { method: 'DELETE' });
  showToast('Account removed.');
  loadUsers();
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open');
}

function logout() {
  ['myl10_token','myl10_user','myl10_impersonating','myl10_admin_token','myl10_admin_user']
    .forEach(k => localStorage.removeItem(k));
  window.location.replace('/');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

init();
</script>
</body>
</html>
